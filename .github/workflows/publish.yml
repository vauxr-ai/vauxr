name: Publish Docker Image

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y.%m.%d)
          # List existing tags matching today's date prefix
          EXISTING=$(gh api repos/${{ github.repository }}/git/matching-refs/tags/${TODAY}. \
            --jq '.[].ref' 2>/dev/null || true)

          if [ -z "$EXISTING" ]; then
            N=0
          else
            # Extract the trailing number from each tag and find the max
            MAX=$(echo "$EXISTING" \
              | sed 's|refs/tags/||' \
              | awk -F. '{print $NF}' \
              | sort -n \
              | tail -1)
            N=$((MAX + 1))
          fi

          VERSION="${TODAY}.${N}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image name
        id: image
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "name=vauxr/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
